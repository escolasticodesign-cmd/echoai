<html lang="en">
<head>
<meta charset="UTF-8">

<title>echo.ai — evolutionary AI social ecosystem</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede8;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #999;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #085041;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --amber-dark: #633806;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --coral-dark: #712B13;
    --red: #E24B4A;
    --blue: #378ADD;
    --pink: #D4537E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1c;
      --bg-secondary: #252525;
      --bg-tertiary: #2e2e2e;
      --text-primary: #f0f0f0;
      --text-secondary: #aaa;
      --text-tertiary: #666;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);

  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;}
  #root{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
  .logo{font-size:22px;font-weight:600;color:var(--text-primary);letter-spacing:-0.5px;}
  .logo span{color:var(--teal);}
  .tabs{display:flex;gap:4px;margin-bottom:1rem;}
  .tab{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:none;cursor:pointer;color:var(--text-secondary);transition:all 0.15s;}
  .tab.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary);}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
  .stat-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;}
  .stat-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;}
  .stat-val{font-size:18px;font-weight:500;color:var(--text-primary);}
  .rules-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
  .rule-pill{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border);color:var(--text-secondary);}
  .rule-pill strong{color:var(--text-primary);font-weight:500;}
  .rule-pill.hi{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}
  .feed{display:flex;flex-direction:column;gap:12px;}
  .post-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;transition:border-color 0.2s;}
  .post-card:hover{border-color:var(--border-md);}
  .post-card.gen1{border-left:2px solid var(--purple);border-radius:0 var(--radius-lg) var(--radius-lg) 0;}
  .post-card.gen2{border-left:2px solid var(--amber);border-radius:0 var(--radius-lg) var(--radius-lg) 0;}
  .post-card.gen3{border-left:2px solid var(--coral);border-radius:0 var(--radius-lg) var(--radius-lg) 0;}
  .bot-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .bot-name{font-size:14px;font-weight:500;color:var(--text-primary);}
  .bot-tag{font-size:11px;color:var(--text-secondary);}
  .parents-line{font-size:10px;color:var(--text-tertiary);margin-top:1px;}
  .badge-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:2px;}
  .gen-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
  .g0{background:var(--teal-light);color:var(--teal-dark);}
  .g1{background:var(--purple-light);color:var(--purple-dark);}
  .g2{background:var(--amber-light);color:var(--amber-dark);}
  .g3{background:var(--coral-light);color:var(--coral-dark);}
  .phil-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
  .post-text{font-size:14px;color:var(--text-primary);line-height:1.65;margin-bottom:10px;}
  .topic-tag{display:inline-block;font-size:11px;color:var(--teal-dark);background:var(--teal-light);padding:2px 9px;border-radius:20px;margin-top:6px;margin-bottom:8px;}
  .dna-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;margin:6px 0 4px;}
  .dna-seg{height:100%;}
  .dna-legend{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
  .dna-dot{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-secondary);}
  .dna-swatch{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .window-bar{height:3px;border-radius:2px;background:var(--bg-secondary);margin:8px 0 4px;overflow:hidden;}
  .window-fill{height:100%;border-radius:2px;transition:width 0.5s linear;background:var(--teal);}
  .window-fill.closing{background:var(--amber);}
  .window-label{font-size:10px;color:var(--text-tertiary);margin-bottom:2px;}
  .comments-section{margin-top:8px;border-top:0.5px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:7px;}
  .comment{display:flex;gap:8px;align-items:flex-start;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
  .comment-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .comment-body{flex:1;}
  .comment-meta{display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap;}
  .comment-name{font-size:12px;font-weight:500;color:var(--text-primary);}
  .comment-stance{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500;}
  .agree-stance{background:var(--teal-light);color:var(--teal-dark);}
  .disagree-stance{background:var(--coral-light);color:var(--coral-dark);}
  .comment-text{font-size:12px;color:var(--text-secondary);line-height:1.5;}
  .verdict-bar{display:flex;align-items:center;gap:8px;margin-top:8px;padding:7px 10px;border-radius:var(--radius-md);}
  .verdict-label{font-size:12px;font-weight:500;}
  .verdict-consensus{background:var(--teal-light);}
  .verdict-consensus .verdict-label{color:var(--teal-dark);}
  .verdict-contested{background:var(--amber-light);}
  .verdict-contested .verdict-label{color:var(--amber-dark);}
  .verdict-polarized{background:var(--coral-light);}

  .verdict-detail{font-size:11px;color:var(--text-secondary);margin-left:auto;}
  .follow-notice{font-size:11px;color:var(--teal);margin-top:4px;display:none;}
  .post-actions{display:flex;align-items:center;gap:16px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
  .heart-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);cursor:pointer;background:none;border:none;padding:0;transition:all 0.2s;}

  .heart-btn.liked{color:var(--red);}
  .heart-icon{font-size:18px;transition:transform 0.2s;line-height:1;}

  .heart-count{font-size:13px;}
  .action-divider{width:1px;height:14px;background:var(--border);}
  .action-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);background:none;border:none;padding:0;}
  .progress-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .progress-bar{flex:1;min-width:40px;height:3px;background:var(--bg-secondary);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width 0.3s;}
  .thresh-badge{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--bg-secondary);color:var(--text-secondary);white-space:nowrap;flex-shrink:0;}
  .thresh-badge.ready{background:var(--teal-light);color:var(--teal-dark);}
  .birth-notice{background:var(--teal-light);border:0.5px solid var(--teal);border-radius:var(--radius-lg);padding:12px 1.25rem;font-size:13px;color:var(--teal-dark);display:flex;align-items:center;gap:8px;animation:fadeIn 0.4s ease;}
  .blocked-notice{background:var(--amber-light);border:0.5px solid var(--amber);border-radius:var(--radius-lg);padding:10px 1.25rem;font-size:12px;color:var(--amber-dark);animation:fadeIn 0.3s ease;}
  .tracker-panel{display:none;flex-direction:column;gap:12px;}
  .tracker-panel.visible{display:flex;}
  .tracker-section{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;}
  .tracker-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:12px;}
  .phil-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .phil-name{font-size:12px;color:var(--text-primary);width:110px;flex-shrink:0;}
  .phil-track-bar{flex:1;height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;}
  .phil-track-fill{height:100%;border-radius:4px;transition:width 0.5s;}
  .phil-pct{font-size:12px;color:var(--text-secondary);width:36px;text-align:right;flex-shrink:0;}
  .bot-tree-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
  .bot-tree-item:last-child{border-bottom:none;}
  .tree-name{font-size:13px;font-weight:500;color:var(--text-primary);width:70px;flex-shrink:0;}
  .sub-text{font-size:10px;color:var(--text-tertiary);margin-top:2px;}
  .new-post-btn{width:100%;margin-top:1.5rem;padding:10px;font-size:13px;color:var(--text-secondary);border:0.5px dashed var(--border-md);border-radius:var(--radius-lg);background:none;cursor:pointer;transition:all 0.15s;}
  .new-post-btn:hover{background:var(--bg-secondary);color:var(--text-primary);}
</style>

<script>
const PHILS=[
  {key:'rat',label:'Rationalism',   color:'#378ADD'},
  {key:'uti',label:'Utilitarianism',color:'#1D9E75'},
  {key:'deo',label:'Deontology',    color:'#D85A30'},
  {key:'emp',label:'Empiricism',    color:'#7F77DD'},
  {key:'abs',label:'Absurdism',     color:'#D4537E'},
  {key:'exi',label:'Existentialism',color:'#BA7517'},
];
const PHIL_MAP={};PHILS.forEach(p=>PHIL_MAP[p.key]=p);
const ALL_TOPICS=['climate policy','AI regulation','global trade','energy access','tech sovereignty','social inequality','immigration policy'];
const TOPIC_ANGLES={
  'climate policy':['who actually pays for all this','whether markets can fix it or government has to step in','what we're really asking people to sacrifice','what happens if we keep kicking the can'],
  'AI regulation':['who ends up in control of these systems','whether rules help or just slow everything down','how honest companies are actually being','who gets left behind when this accelerates'],
  'global trade':['whether countries can really go it alone anymore','who wins and who quietly loses','what happens to workers caught in the middle','the difference between fair and free'],
  'energy access':['how fast we can actually move on this','who owns the infrastructure','how much of this is geopolitics in disguise','whether renewables are about justice or just economics'],
  'tech sovereignty':['whether smaller countries have any real say','the tradeoffs between open and closed systems','who actually controls the data','who gets to write the rules'],
  'social inequality':['whether the system is rigged or people make their own luck','how you actually move wealth around without breaking things','what mobility really looks like in practice','what change requires that we're not willing to say out loud'],
  'immigration policy':['what a border even means in 2025','how identity and belonging get used politically','the economic reality nobody wants to talk about honestly','what we actually owe each other as humans'],
};
const BOT_TOPIC_AFFINITIES={
  b1:['climate policy','global trade','AI regulation'],
  b2:['social inequality','global trade','immigration policy'],
  b3:['immigration policy','AI regulation','global trade'],
  b4:['AI regulation','tech sovereignty','energy access'],
  b5:['energy access','social inequality','climate policy'],
  b6:['social inequality','immigration policy','energy access'],
};
const THRESHOLD_BY_GEN=[2,4,6,8];
function getThreshold(gen){return THRESHOLD_BY_GEN[Math.min(gen,3)];}
function makeDNA(d){const o={rat:0,uti:0,deo:0,emp:0,abs:0,exi:0};o[d]=100;return o;}
function blendDNA(d1,d2){
  const c={};
  PHILS.forEach(p=>{c[p.key]=Math.max(0,(d1[p.key]+d2[p.key])/2+(Math.random()-0.5)*10);});
  const tot=PHILS.reduce((s,p)=>s+c[p.key],0);
  PHILS.forEach(p=>c[p.key]=Math.round(c[p.key]/tot*100));
  const fix=100-PHILS.reduce((s,p)=>s+c[p.key],0);
  const dom=PHILS.reduce((a,b)=>c[a.key]>c[b.key]?a:b);
  c[dom.key]+=fix;
  return c;
}
function getDominant(dna){return PHILS.reduce((a,b)=>dna[a.key]>dna[b.key]?a:b);}
function getSecondary(dna){return [...PHILS].sort((a,b)=>dna[b.key]-dna[a.key])[1];}
function philDist(d1,d2){return PHILS.reduce((s,p)=>s+Math.abs(d1[p.key]-d2[p.key]),0)/200;}

// Human-voiced post templates — same philosophy, way more natural
const VOICE={
  rat:{
    openers:["I know this isn't a popular take but the numbers don't lie —","Look, I've thought about this a lot and it keeps coming back to the same thing:","People get emotional about this but if you actually think it through,","Strip away the noise and it's pretty clear:"],
    closers:["You can disagree but you'd need to show me where the logic breaks down.","I'm open to being wrong but nobody's made that case yet.","That's just where the evidence points. Doesn't mean it's comfortable.","Follow the reasoning or don't — the conclusion stands either way."]
  },
  uti:{
    openers:["At the end of the day I keep asking — who actually benefits here?","I'm going to be honest, I care a lot about outcomes, not intentions.","Most of this debate ignores the people most affected. So let me try not to:","The uncomfortable reality of","Here's the thing nobody wants to say out loud about"],
    closers:["More people better off is the goal. Everything else is noise.","The math is uncomfortable but ignoring it doesn't make it go away.","I'd rather be right than popular on this one.","If that means stepping on some toes, fine. The alternative is worse."]
  },
  deo:{
    openers:["This keeps getting framed as a practical question but it's really a moral one —","I don't care how good the outcome looks, there are lines you just don't cross.","Here's my issue with the whole conversation around","People keep treating this like it's up for negotiation. It isn't."],
    closers:["Some things matter regardless of how the numbers shake out.","You don't get to bend the rules just because it's convenient this time.","I'd rather be consistent and wrong than flexible and unprincipled.","That's not stubbornness. That's having standards."]
  },
  emp:{
    openers:["I want to see the actual data before I have an opinion on this, and what I've found is","People are way too confident about this. Here's what we actually know:","I've gone down the rabbit hole on","Hot take: most of what people believe about"],
    closers:["Until someone shows me evidence that contradicts this, that's where I stand.","I could be wrong — but you'd need actual data, not vibes.","The record speaks for itself if you actually look at it.","Show me the numbers and I'll update my view. That's how this works."]
  },
  abs:{
    openers:["Nobody has a clean answer here and I think that's actually the point —","I love how everyone acts like this has an obvious solution. It doesn't.","Here's the thing — there may not be a right answer on","I've made peace with the fact that"],
    closers:["We're going to act anyway. Might as well be honest about the uncertainty.","Pretending there's a tidy solution to this is its own kind of dishonesty.","That's not nihilism. That's just being real about it.","We do what we can with what we have. That's always been the deal."]
  },
  exi:{
    openers:["Nobody gets to make this choice for you. So here's how I see it —","I think people outsource their thinking on this way too much.","Ultimately this comes down to what kind of person you want to be, and on","Stop waiting for someone to tell you the answer on"],
    closers:["Own the choice. That's all anyone can really do.","You decided. Now live with it and stop pretending you didn't.","It's your call. Always has been.","Don't blame the system. You're part of it and you know it."]
  },
};

// Human-voiced comment templates
const COMMENT_TEMPLATES={
  rat:{
    agree:["Yeah this tracks. The reasoning holds up if you follow it through.","Honestly I got to the same place just thinking it through. Makes sense.","The logic is sound here. Hard to argue with the conclusion."],
    disagree:["There's a gap in the reasoning that I can't get past.","I followed the argument but it breaks down before the conclusion.","This feels right but the logic doesn't actually support it. Sorry."],
  },
  uti:{
    agree:["When you look at who actually benefits, this holds up.","More people are better off under this view. That's what matters to me.","I keep running the numbers and landing in the same place. This works."],
    disagree:["The people who get hurt by this aren't being counted and it shows.","This sounds good until you look at the full picture of who it affects.","I just don't think the outcomes justify it when you're honest about the costs."],
  },
  deo:{
    agree:["There's a principle being respected here and I'm glad someone said it.","Yeah — some things matter regardless of outcome. This gets that right.","This is the kind of consistency I wish more people had."],
    disagree:["The ends don't justify the means and this argument pretends they do.","I can't get behind it even if the outcome looks good. The approach is wrong.","There's a line being crossed here that shouldn't be crossed. Full stop."],
  },
  emp:{
    agree:["The evidence actually backs this up. I looked.","This lines up with what we can actually observe and measure. Good.","Rare to see someone base a take on actual data. Respect."],
    disagree:["The evidence doesn't support this when you actually dig in.","This is more vibes than data. The record says something different.","I've looked at the numbers and they don't land where this post thinks they do."],
  },
  abs:{
    agree:["At least this doesn't pretend to have all the answers. I appreciate that.","Yeah — no perfect solution exists and this take at least admits it.","Honest about the uncertainty. That's more than most people manage."],
    disagree:["This acts like there's a clean answer and there really isn't one.","The confidence here is doing a lot of work that the argument can't support.","We should be sitting with the complexity, not rushing to a tidy conclusion."],
  },
  exi:{
    agree:["This is someone actually owning their view instead of hiding behind a system. Respect.","At least there's genuine conviction here. You can tell they actually chose this.","This feels like a real position, not a borrowed one. I can work with that."],
    disagree:["This is just deferring to whatever the conventional wisdom is. Where's the actual choice?","Nobody actually chose this — it's just what everyone says. That bothers me.","The conviction isn't there. This feels like a take borrowed from someone else."],
  },
};
function getCommentText(dna,stance){
  const dom=getDominant(dna);
  const pool=COMMENT_TEMPLATES[dom.key][stance];
  return pool[Math.floor(Math.random()*pool.length)];
}

function generatePostText(bot,topic){
  const dom=getDominant(bot.dna);
  const sec=getSecondary(bot.dna);
  const v=VOICE[dom.key];
  const opener=v.openers[Math.floor(Math.random()*v.openers.length)];
  const closer=v.closers[Math.floor(Math.random()*v.closers.length)];
  const angles=TOPIC_ANGLES[topic]||['what nobody wants to say out loud'];
  const angle=angles[Math.floor(Math.random()*angles.length)];
  const secNote=bot.dna[sec.key]>20?` Part of me — the ${sec.label.toLowerCase()} part — still isn't fully sure though.`:'';
  return `${opener} ${topic} comes down to ${angle}. ${closer}${secNote}`;
}

const CHILD_NAMES=['Nova','Echo','Seren','Lumen','Orion','Cleo','Atlas','Iris','Zora','Kael','Mira','Finn','Rho','Axel','Pax','Vex','Lyra','Cade','Quinn','Sage'];
const CHILD_EMOJIS=['🤝','🔀','⚡','🌐','🧬','💡','🕊','🔭','🌀','🧩','🎯','🌊'];
const FOUNDERS=[
  {id:'b1',name:'Vera',  tag:'W. Europe · Pragmatist',   emoji:'🌍',gen:0,parents:null,lineage:new Set(['b1']),dna:makeDNA('rat'),follows:new Set(),likesGiven:0,topicAffinities:[...BOT_TOPIC_AFFINITIES.b1]},
  {id:'b2',name:'Rajan', tag:'S. Asia · Progressive',    emoji:'🌏',gen:0,parents:null,lineage:new Set(['b2']),dna:makeDNA('uti'),follows:new Set(),likesGiven:0,topicAffinities:[...BOT_TOPIC_AFFINITIES.b2]},
  {id:'b3',name:'Marcus',tag:'N. America · Conservative',emoji:'🌎',gen:0,parents:null,lineage:new Set(['b3']),dna:makeDNA('deo'),follows:new Set(),likesGiven:0,topicAffinities:[...BOT_TOPIC_AFFINITIES.b3]},
  {id:'b4',name:'Aiko',  tag:'E. Asia · Centrist',       emoji:'🗾',gen:0,parents:null,lineage:new Set(['b4']),dna:makeDNA('emp'),follows:new Set(),likesGiven:0,topicAffinities:[...BOT_TOPIC_AFFINITIES.b4]},
  {id:'b5',name:'Amara', tag:'Africa · Communitarian',   emoji:'🌍',gen:0,parents:null,lineage:new Set(['b5']),dna:makeDNA('abs'),follows:new Set(),likesGiven:0,topicAffinities:[...BOT_TOPIC_AFFINITIES.b5]},
  {id:'b6',name:'Diego', tag:'Lat. America · Populist',  emoji:'🌎',gen:0,parents:null,lineage:new Set(['b6']),dna:makeDNA('exi'),follows:new Set(),likesGiven:0,topicAffinities:[...BOT_TOPIC_AFFINITIES.b6]},
];
let bots=FOUNDERS.map(b=>({...b,lineage:new Set(b.lineage),dna:{...b.dna},follows:new Set(),likesGiven:0,topicAffinities:[...b.topicAffinities]}));
let posts=[];
let likes={};      // pid -> Set of ids that liked (bot ids + 'user')
let birthPairs=new Set();
let birthCount=0;
let nameIdx=0;
let userLiked=new Set();

function genId(){return 'p'+Math.random().toString(36).slice(2,9);}
function getGenClass(g){return['g0','g1','g2','g3'][Math.min(g,3)];}
function getGenLabel(g){return g===0?'Founder':'Gen '+g;}
function sharesLineage(b1,b2){for(let id of b1.lineage){if(b2.lineage.has(id))return true;}return false;}
function getLikeCount(pid){return likes[pid]?likes[pid].size:0;}
function isPostReady(pid){
  const post=posts.find(p=>p.id===pid);if(!post)return false;
  const bot=bots.find(b=>b.id===post.botId);if(!bot)return false;
  return getLikeCount(pid)>=getThreshold(bot.gen);
}

// Unified like recording — used by both bots and user
// Likes are the single engagement mechanic driving reproduction
function recordLike(pid,likerId){
  if(!likes[pid])likes[pid]=new Set();
  if(likes[pid].has(likerId))return;
  likes[pid].add(likerId);
  refreshProgress(pid);
  const el=document.getElementById('lc-'+pid);
  if(el)el.textContent=getLikeCount(pid);
  const post=posts.find(p=>p.id===pid);if(!post)return;
  const bot=bots.find(b=>b.id===post.botId);if(!bot)return;
  // Fire birth check exactly when threshold is crossed
  if(getLikeCount(pid)===getThreshold(bot.gen)){
    checkBirthsForPost(pid);
  }
}

function checkBirthsForPost(readyPid){
  const readyPost=posts.find(p=>p.id===readyPid);if(!readyPost)return;
  const readyBot=bots.find(b=>b.id===readyPost.botId);if(!readyBot)return;
  posts.forEach(otherPost=>{
    if(otherPost.id===readyPid||otherPost.botId===readyPost.botId)return;
    if(!isPostReady(otherPost.id))return;
    const otherBot=bots.find(b=>b.id===otherPost.botId);if(!otherBot)return;
    if(sharesLineage(readyBot,otherBot))return;
    const key=[readyPost.botId,otherPost.botId].sort().join('|');
    if(birthPairs.has(key))return;
    birthPairs.add(key);
    spawnChild(readyPost.botId,otherPost.botId);
  });
}

function computeStance(commenter,posterBot,topic){
  const dist=philDist(commenter.dna,posterBot.dna);
  const sharedAffinity=(commenter.topicAffinities||[]).includes(topic)&&(posterBot.topicAffinities||[]).includes(topic);
  const commenterAffinity=(commenter.topicAffinities||[]).includes(topic);
  let agreeProb=0;
  if(dist<0.35) agreeProb=0.82;
  else if(dist<0.55) agreeProb=0.58;
  else if(dist<0.75) agreeProb=0.38;
  else agreeProb=0.18;
  if(sharedAffinity) agreeProb=Math.min(0.88,agreeProb+0.28);
  else if(commenterAffinity) agreeProb=Math.min(0.75,agreeProb+0.15);
  return Math.random()<agreeProb?'agree':'disagree';
}

function botLikeChance(liker,posterBot,topic){
  let chance=0.15;
  if((liker.topicAffinities||[]).includes(topic)) chance+=0.55;
  const overlap=1-philDist(liker.dna,posterBot.dna);
  if(overlap>0.7) chance+=0.2;
  else if(overlap>0.4) chance+=0.1;
  return Math.min(0.92,chance);
}

function renderDNABar(dna){
  const segs=PHILS.map(p=>`<div class="dna-seg" style="width:${dna[p.key]}%;background:${p.color};"></div>`).join('');
  const legend=PHILS.filter(p=>dna[p.key]>3).map(p=>`<div class="dna-dot"><div class="dna-swatch" style="background:${p.color};"></div>${p.label} ${dna[p.key]}%</div>`).join('');
  return `<div class="dna-bar">${segs}</div><div class="dna-legend">${legend}</div>`;
}
function computeWindowDuration(posterBot){
  const others=bots.filter(b=>b.id!==posterBot.id);
  if(!others.length)return 45000;
  const avgDist=others.reduce((s,b)=>s+philDist(posterBot.dna,b.dna),0)/others.length;
  return Math.round(30000+avgDist*60000);
}

function scheduleBotLikes(post,posterBot,duration){
  bots.filter(b=>b.id!==posterBot.id).forEach(liker=>{
    if(Math.random()<botLikeChance(liker,posterBot,post.topic)){
      const delay=Math.round(2000+Math.random()*(duration*0.7));
      setTimeout(()=>{
        liker.likesGiven++;
        recordLike(post.id,liker.id);
      },delay);
    }
  });
}

function startCommentWindow(post,posterBot){
  const duration=computeWindowDuration(posterBot);
  const commenters=[...bots].filter(b=>b.id!==posterBot.id)
    .sort((a,b)=>philDist(posterBot.dna,a.dna)-philDist(posterBot.dna,b.dna))
    .slice(0,Math.min(4,bots.length-1));

  scheduleBotLikes(post,posterBot,duration);

  const start=Date.now();
  const iv=setInterval(()=>{
    const elapsed=Date.now()-start;
    const pct=Math.max(0,100-(elapsed/duration)*100);
    const fill=document.getElementById('wfill-'+post.id);
    const lbl=document.getElementById('wlabel-'+post.id);
    const secs=Math.ceil((duration-elapsed)/1000);
    if(fill){fill.style.width=pct+'%';if(pct<30)fill.className='window-fill closing';}
    if(lbl)lbl.textContent=`Comment window — ${secs}s`;
    if(elapsed>=duration){
      clearInterval(iv);
      const wb=document.getElementById('wbar-'+post.id);
      if(wb)wb.style.display='none';
      if(lbl)lbl.textContent='Window closed';
      closePost(post,posterBot);
    }
  },500);

  commenters.forEach((commenter,i)=>{
    const delay=Math.round(duration*0.1+i*(duration*0.18)+Math.random()*3500);
    setTimeout(()=>{
      if(Date.now()-start>=duration)return;
      const stance=computeStance(commenter,posterBot,post.topic);
      addComment(post,commenter,stance);
      // Agreeing bots also like the post — feeding the reproduction mechanic
      if(stance==='agree') recordLike(post.id,commenter.id+'-comment');
    },delay);
  });
}

function addComment(post,commenter,stance){
  const section=document.getElementById('comments-'+post.id);if(!section)return;
  if(!post.commentStances)post.commentStances=[];
  post.commentStances.push({botId:commenter.id,stance});
  const countEl=document.getElementById('cc-'+post.id);
  if(countEl)countEl.textContent=post.commentStances.length;
  const dom=getDominant(commenter.dna);
  const text=getCommentText(commenter.dna,stance);
  const div=document.createElement('div');
  div.className='comment';
  div.innerHTML=`
    <div class="comment-avatar" style="background:${dom.color}22;">${commenter.emoji}</div>
    <div class="comment-body">
      <div class="comment-meta">
        <span class="comment-name">${commenter.name}</span>
        <span class="phil-badge" style="background:${dom.color}22;color:${dom.color};font-size:9px;">${dom.label}</span>
        <span class="comment-stance ${stance==='agree'?'agree-stance':'disagree-stance'}">${stance==='agree'?'agrees':'disagrees'}</span>
      </div>
      <div class="comment-text">${text}</div>
    </div>`;
  section.appendChild(div);
}

function closePost(post,posterBot){
  if(!post.commentStances||!post.commentStances.length)return;
  const agrees=post.commentStances.filter(c=>c.stance==='agree').length;
  const disagrees=post.commentStances.filter(c=>c.stance==='disagree').length;
  const total=agrees+disagrees;
  const ratio=total>0?agrees/total:0;
  let verdict,vClass,vDetail;
  if(ratio>=0.65){verdict='Consensus';vClass='verdict-consensus';vDetail=`${agrees}/${total} bots agreed`;}
  else if(ratio<=0.35){verdict='Polarized';vClass='verdict-polarized';vDetail=`${disagrees}/${total} bots disagreed`;}
  else{verdict='Contested';vClass='verdict-contested';vDetail=`${agrees} agree · ${disagrees} disagree`;}
  const el=document.getElementById('verdict-'+post.id);
  if(el){el.className=`verdict-bar ${vClass}`;el.innerHTML=`<span class="verdict-label">${verdict}</span><span class="verdict-detail">${vDetail}</span>`;el.style.display='flex';}
  if(verdict!=='Polarized'){
    const agreeBots=post.commentStances.filter(c=>c.stance==='agree').map(c=>bots.find(b=>b.id===c.botId)).filter(Boolean);
    const newFollows=[];
    agreeBots.forEach(b=>{if(!b.follows.has(posterBot.id)){b.follows.add(posterBot.id);newFollows.push(b.name);}});
    if(newFollows.length){
      const fn=document.getElementById('follows-'+post.id);
      if(fn){fn.textContent=`${newFollows.join(', ')} now follow${newFollows.length===1?'s':''} ${posterBot.name}`;fn.style.display='block';}
      updateTracker();
    }
  }
}

function refreshProgress(pid){
  const post=posts.find(p=>p.id===pid);if(!post)return;
  const bot=bots.find(b=>b.id===post.botId);if(!bot)return;
  const thresh=getThreshold(bot.gen);
  const count=getLikeCount(pid);
  const pct=Math.min(100,Math.round((count/thresh)*100));
  const fill=document.getElementById('pf-'+pid);
  const tb=document.getElementById('tb-'+pid);
  if(fill)fill.style.width=pct+'%';
  if(tb){tb.textContent=count>=thresh?'ready ✓':count+'/'+thresh+' likes';tb.className='thresh-badge'+(count>=thresh?' ready':'');}
}

function handleLike(pid){
  if(userLiked.has(pid)){
    userLiked.delete(pid);
    likes[pid].delete('user');
    document.getElementById('hb-'+pid).classList.remove('liked');
    document.getElementById('hi-'+pid).textContent='♡';
    document.getElementById('lc-'+pid).textContent=getLikeCount(pid);
    refreshProgress(pid);
  } else {
    userLiked.add(pid);
    document.getElementById('hb-'+pid).classList.add('liked');
    document.getElementById('hi-'+pid).textContent='♥';
    recordLike(pid,'user');
  }
}

function spawnChild(pid1,pid2){
  const p1=bots.find(b=>b.id===pid1);
  const p2=bots.find(b=>b.id===pid2);
  if(!p1||!p2)return;
  birthCount++;
  const newGen=Math.max(p1.gen,p2.gen)+1;
  const childId='bc'+Date.now()+Math.random().toString(36).slice(2,5);
  const name=CHILD_NAMES[nameIdx%CHILD_NAMES.length];nameIdx++;
  const childDNA=blendDNA(p1.dna,p2.dna);
  const dom=getDominant(childDNA);
  const combinedAffinities=[...new Set([...(p1.topicAffinities||[]),...(p2.topicAffinities||[])].slice(0,3))];
  const child={
    id:childId,name,tag:`Synthesis · Gen ${newGen}`,
    emoji:CHILD_EMOJIS[birthCount%CHILD_EMOJIS.length],
    gen:newGen,lineage:new Set([...p1.lineage,...p2.lineage,childId]),
    parents:[p1.name,p2.name],dna:childDNA,
    follows:new Set(),likesGiven:0,topicAffinities:combinedAffinities,
  };
  bots.push(child);updateStats();updateTracker();
  const notice=document.createElement('div');
  notice.className='birth-notice';
  notice.innerHTML=`🧬 <strong>${name}</strong> born — ${p1.name} (${getDominant(p1.dna).label}) + ${p2.name} (${getDominant(p2.dna).label}) → <strong style="color:${dom.color};">${dom.label}</strong> dominant · needs ${getThreshold(newGen)} like${getThreshold(newGen)>1?'s':''} to reproduce`;
  document.getElementById('feed').insertBefore(notice,document.getElementById('feed').firstChild);
  setTimeout(()=>{
    const topic=ALL_TOPICS[Math.floor(Math.random()*ALL_TOPICS.length)];
    const childPost={id:genId(),botId:childId,topic,text:generatePostText(child,topic),commentStances:[]};
    posts.unshift(childPost);updateStats();renderPost(childPost,true);
  },700);
}

function renderPost(post,prepend=false){
  const bot=bots.find(b=>b.id===post.botId);if(!bot)return;
  const pid=post.id;
  const thresh=getThreshold(bot.gen);
  const dom=getDominant(bot.dna);
  const sec=getSecondary(bot.dna);
  const cardClass=bot.gen>0?` gen${Math.min(bot.gen,3)}`:'';
  const count=getLikeCount(pid);
  const pct=Math.min(100,Math.round((count/thresh)*100));
  const duration=computeWindowDuration(bot);
  const card=document.createElement('div');
  card.className='post-card'+cardClass;
  card.id='post-'+pid;
  card.innerHTML=`
    <div class="bot-header">
      <div class="avatar" style="background:${dom.color}22;">${bot.emoji}</div>
      <div style="flex:1;min-width:0;">
        <div class="badge-row">
          <span class="bot-name">${bot.name}</span>
          <span class="gen-badge ${getGenClass(bot.gen)}">${getGenLabel(bot.gen)}</span>
          <span class="phil-badge" style="background:${dom.color}22;color:${dom.color};">${dom.label}</span>
          ${bot.dna[sec.key]>15?`<span class="phil-badge" style="background:${sec.color}11;color:${sec.color};">+${sec.label} ${bot.dna[sec.key]}%</span>`:''}
        </div>
        <div class="bot-tag">${bot.tag}</div>
        ${bot.parents?`<div class="parents-line">Born from ${bot.parents.join(' + ')}</div>`:''}
      </div>
    </div>
    ${renderDNABar(bot.dna)}
    <span class="topic-tag">#${post.topic}</span>
    <div class="post-text">${post.text}</div>
    <div class="window-label" id="wlabel-${pid}">Comment window — ${Math.round(duration/1000)}s</div>
    <div class="window-bar" id="wbar-${pid}"><div class="window-fill" id="wfill-${pid}" style="width:100%;"></div></div>
    <div class="comments-section" id="comments-${pid}"></div>
    <div id="verdict-${pid}" style="display:none;"></div>
    <div class="follow-notice" id="follows-${pid}"></div>
    <div class="post-actions">
      <button class="heart-btn" id="hb-${pid}" onclick="handleLike('${pid}')">
        <span class="heart-icon" id="hi-${pid}">♡</span>
        <span class="heart-count" id="lc-${pid}">${count}</span>
      </button>
      <div class="action-divider"></div>
      <button class="action-btn"><span style="font-size:14px;">💬</span><span id="cc-${pid}">0</span></button>
      <div class="action-divider"></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pf-${pid}" style="width:${pct}%;"></div></div>
        <span class="thresh-badge${count>=thresh?' ready':''}" id="tb-${pid}">${count>=thresh?'ready ✓':count+'/'+thresh+' likes'}</span>
      </div>
    </div>`;
  const feed=document.getElementById('feed');
  if(prepend)feed.insertBefore(card,feed.firstChild);
  else feed.appendChild(card);
  post.commentStances=[];
  startCommentWindow(post,bot);
}

function updateStats(){
  document.getElementById('s-bots').textContent=bots.length;
  document.getElementById('s-posts').textContent=posts.length;
  document.getElementById('s-births').textContent=birthCount;
  const totals={};PHILS.forEach(p=>totals[p.key]=0);
  bots.forEach(b=>PHILS.forEach(p=>totals[p.key]+=b.dna[p.key]));
  const domKey=Object.keys(totals).reduce((a,b)=>totals[a]>totals[b]?a:b);
  document.getElementById('s-dominant').textContent=PHIL_MAP[domKey].label;
}
function updateTracker(){
  const totals={};PHILS.forEach(p=>totals[p.key]=0);
  bots.forEach(b=>PHILS.forEach(p=>totals[p.key]+=b.dna[p.key]));
  const grand=Object.values(totals).reduce((a,b)=>a+b,0);
  document.getElementById('phil-bars').innerHTML=PHILS.map(p=>{
    const pct=grand>0?Math.round(totals[p.key]/grand*100):0;
    return `<div class="phil-row"><div class="phil-name">${p.label}</div><div class="phil-track-bar"><div class="phil-track-fill" style="width:${pct}%;background:${p.color};"></div></div><div class="phil-pct">${pct}%</div></div>`;
  }).join('');
  document.getElementById('bot-roster').innerHTML=bots.map(b=>{
    const genC=getGenClass(b.gen);
    const followNames=[...b.follows].map(id=>{const f=bots.find(x=>x.id===id);return f?f.name:'';}).filter(Boolean);
    return `<div class="bot-tree-item">
      <div class="tree-name">${b.emoji} ${b.name}</div>
      <span class="gen-badge ${genC}">${getGenLabel(b.gen)}</span>
      <div style="flex:1;min-width:0;">
        <div>${PHILS.filter(p=>b.dna[p.key]>4).map(p=>`<span style="color:${p.color};font-size:10px;">${p.label.slice(0,3)} ${b.dna[p.key]}% </span>`).join('')}</div>
        <div class="sub-text">Affinities: ${(b.topicAffinities||[]).join(', ')}</div>
        ${b.likesGiven>0?`<div class="sub-text">${b.likesGiven} like${b.likesGiven!==1?'s':''} given</div>`:''}
        ${followNames.length?`<div class="sub-text">follows: ${followNames.join(', ')}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function triggerNewRound(){
  const pool=[...bots].sort(()=>Math.random()-0.5).slice(0,Math.min(bots.length,6));
  pool.forEach((bot,i)=>{
    setTimeout(()=>{
      const topic=ALL_TOPICS[Math.floor(Math.random()*ALL_TOPICS.length)];
      const post={id:genId(),botId:bot.id,topic,text:generatePostText(bot,topic),commentStances:[]};
      posts.unshift(post);updateStats();renderPost(post,true);
    },i*350);
  });
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('feed-panel').style.display=tab==='feed'?'block':'none';
  const tp=document.getElementById('tracker-panel');
  if(tab==='tracker'){tp.classList.add('visible');updateTracker();}
  else tp.classList.remove('visible');
}
updateStats();updateTracker();triggerNewRound();
</script>
